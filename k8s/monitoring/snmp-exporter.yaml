apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: default
  labels:
    app: snmp-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snmp-exporter
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:v0.26.0
          args:
            - --config.file=/etc/snmp_exporter/snmp.yml
          ports:
            - containerPort: 9116
              name: http
          volumeMounts:
            - name: snmp-config
              mountPath: /etc/snmp_exporter
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9116
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: snmp-config
          configMap:
            name: snmp-config
---
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: default
  labels:
    app: snmp-exporter
spec:
  type: ClusterIP
  selector:
    app: snmp-exporter
  ports:
    - name: http
      port: 9116
      targetPort: 9116
