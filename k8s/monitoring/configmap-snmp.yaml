apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-config
  namespace: default
data:
  snmp.yml: |
    # ── 인증 설정 (v0.24+ 분리 형식) ────────────────────────────────────
    # auth는 모듈 내부가 아닌 Prometheus scrape params로 참조
    auths:
      gpu_monitor_auth:
        community: gpu-monitor
        version: 2

    # ── 모듈 정의 ────────────────────────────────────────────────────────
    modules:

      # ── if_mib : 네트워크 인터페이스 ──────────────────────────────────
      if_mib:
        walk:
          - 1.3.6.1.2.1.2.2        # ifTable
          - 1.3.6.1.2.1.31.1.1     # ifXTable (64-bit counters)
        metrics:
          - name: ifOperStatus
            oid: 1.3.6.1.2.1.2.2.1.8
            type: gauge
            help: "인터페이스 운영 상태 (1=up, 2=down)"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifSpeed
            oid: 1.3.6.1.2.1.2.2.1.5
            type: gauge
            help: "인터페이스 대역폭 (bps)"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString

          - name: ifHCInOctets
            oid: 1.3.6.1.2.1.31.1.1.1.6
            type: counter
            help: "수신 바이트 수 (64-bit)"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString

          - name: ifHCOutOctets
            oid: 1.3.6.1.2.1.31.1.1.1.10
            type: counter
            help: "송신 바이트 수 (64-bit)"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString

          - name: ifInErrors
            oid: 1.3.6.1.2.1.2.2.1.14
            type: counter
            help: "수신 에러 패킷 수"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString

          - name: ifOutErrors
            oid: 1.3.6.1.2.1.2.2.1.20
            type: counter
            help: "송신 에러 패킷 수"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString

          - name: ifInDiscards
            oid: 1.3.6.1.2.1.2.2.1.13
            type: counter
            help: "수신 드롭 패킷 수"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString

          - name: ifOutDiscards
            oid: 1.3.6.1.2.1.2.2.1.19
            type: counter
            help: "송신 드롭 패킷 수"
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString

      # ── linux_base : CPU / 메모리 / 디스크 / 부하 / 업타임 ───────────
      linux_base:
        walk:
          - 1.3.6.1.2.1.1.3        # sysUpTime
          - 1.3.6.1.4.1.2021.10    # laTable (Load Average)
          - 1.3.6.1.4.1.2021.11    # systemStats (CPU)
          - 1.3.6.1.4.1.2021.4     # memory (UCD-SNMP-MIB)
          - 1.3.6.1.4.1.2021.9     # dskTable (Disk)
        metrics:
          - name: sysUpTime
            oid: 1.3.6.1.2.1.1.3.0
            type: gauge
            help: "시스템 업타임 (1/100초 단위)"

          - name: ssCpuUser
            oid: 1.3.6.1.4.1.2021.11.9.0
            type: gauge
            help: "사용자 영역 CPU 사용률 (%)"

          - name: ssCpuSystem
            oid: 1.3.6.1.4.1.2021.11.10.0
            type: gauge
            help: "커널 영역 CPU 사용률 (%)"

          - name: ssCpuIdle
            oid: 1.3.6.1.4.1.2021.11.11.0
            type: gauge
            help: "CPU 유휴율 (%)"

          - name: ssCpuWait
            oid: 1.3.6.1.4.1.2021.11.54.0
            type: gauge
            help: "I/O 대기 CPU 사용률 (%)"

          - name: memTotalReal
            oid: 1.3.6.1.4.1.2021.4.5.0
            type: gauge
            help: "전체 물리 메모리 (KB)"

          - name: memAvailReal
            oid: 1.3.6.1.4.1.2021.4.6.0
            type: gauge
            help: "사용 가능한 물리 메모리 (KB)"

          - name: memTotalSwap
            oid: 1.3.6.1.4.1.2021.4.3.0
            type: gauge
            help: "전체 스왑 메모리 (KB)"

          - name: memAvailSwap
            oid: 1.3.6.1.4.1.2021.4.4.0
            type: gauge
            help: "사용 가능한 스왑 메모리 (KB)"

          - name: laLoad
            oid: 1.3.6.1.4.1.2021.10.1.3
            type: gauge
            help: "Load Average (1m/5m/15m)"
            indexes:
              - labelname: laIndex
                type: gauge
            lookups:
              - labels: [laIndex]
                labelname: laNames
                oid: 1.3.6.1.4.1.2021.10.1.2
                type: DisplayString

          - name: dskTotal
            oid: 1.3.6.1.4.1.2021.9.1.6
            type: gauge
            help: "파티션 전체 용량 (KB)"
            indexes:
              - labelname: dskIndex
                type: gauge
            lookups:
              - labels: [dskIndex]
                labelname: dskPath
                oid: 1.3.6.1.4.1.2021.9.1.2
                type: DisplayString

          - name: dskAvail
            oid: 1.3.6.1.4.1.2021.9.1.7
            type: gauge
            help: "파티션 가용 용량 (KB)"
            indexes:
              - labelname: dskIndex
                type: gauge
            lookups:
              - labels: [dskIndex]
                labelname: dskPath
                oid: 1.3.6.1.4.1.2021.9.1.2
                type: DisplayString

          - name: dskUsed
            oid: 1.3.6.1.4.1.2021.9.1.8
            type: gauge
            help: "파티션 사용 용량 (KB)"
            indexes:
              - labelname: dskIndex
                type: gauge
            lookups:
              - labels: [dskIndex]
                labelname: dskPath
                oid: 1.3.6.1.4.1.2021.9.1.2
                type: DisplayString

          - name: dskPercent
            oid: 1.3.6.1.4.1.2021.9.1.9
            type: gauge
            help: "파티션 사용률 (%)"
            indexes:
              - labelname: dskIndex
                type: gauge
            lookups:
              - labels: [dskIndex]
                labelname: dskPath
                oid: 1.3.6.1.4.1.2021.9.1.2
                type: DisplayString
